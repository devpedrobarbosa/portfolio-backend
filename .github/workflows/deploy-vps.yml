name: Deploy Portfolio API to VPS

on:
    push:
        branches:
            - main
            - master
    workflow_dispatch:

permissions:
    contents: read

jobs:
    deploy:
        runs-on: ubuntu-latest
        env:
            IMAGE_NAME: portfolio-api:latest
            IMAGE_ARCHIVE: portfolio-api-image.tar
            CONTAINER_NAME: portfolio-api
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Java 17
              uses: actions/setup-java@v4
              with:
                distribution: temurin
                java-version: "17"
                cache: gradle

            - name: Make Gradle wrapper executable
              run: chmod +x ./gradlew

            - name: Build JAR
              run: ./gradlew clean bootJar

            - name: Build Docker image
              run: docker build --build-arg JAR_FILE=build/libs/*.jar -t "$IMAGE_NAME" .

            - name: Export Docker image archive
              run: docker save -o "$IMAGE_ARCHIVE" "$IMAGE_NAME"

            - name: Prepare archive for SCP
              run: |
                set -e
                mkdir -p deploy-artifacts
                cp "$IMAGE_ARCHIVE" "deploy-artifacts/$IMAGE_ARCHIVE"
                chmod 644 "deploy-artifacts/$IMAGE_ARCHIVE"
                ls -l "deploy-artifacts/$IMAGE_ARCHIVE"

            - name: Validate deployment secrets
              env:
                VPS_HOST: ${{ secrets.VPS_HOST }}
                VPS_PORT: ${{ secrets.VPS_PORT }}
                VPS_USER: ${{ secrets.VPS_USER }}
                VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
                VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
                VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
                SPRING_DATA_MONGODB_URI: ${{ secrets.SPRING_DATA_MONGODB_URI }}
                SPRING_DATA_MONGODB_DATABASE: ${{ secrets.SPRING_DATA_MONGODB_DATABASE }}
              run: |
                set -e

                if [ -z "$VPS_HOST" ]; then
                    echo "::error::Missing required secret VPS_HOST"
                    exit 1
                fi

                if [ -z "$VPS_PORT" ]; then
                    echo "::error::Missing required secret VPS_PORT"
                    exit 1
                fi

                if [ -z "$VPS_USER" ]; then
                    echo "::error::Missing required secret VPS_USER"
                    exit 1
                fi

                if [ -z "$VPS_DEPLOY_PATH" ]; then
                    echo "::error::Missing required secret VPS_DEPLOY_PATH"
                    exit 1
                fi

                if [ -z "$SPRING_DATA_MONGODB_URI" ]; then
                    echo "::error::Missing required secret SPRING_DATA_MONGODB_URI"
                    exit 1
                fi

                if [ -z "$SPRING_DATA_MONGODB_DATABASE" ]; then
                    echo "::error::Missing required secret SPRING_DATA_MONGODB_DATABASE"
                    exit 1
                fi

                if [ -z "$VPS_PASSWORD" ] && [ -z "$VPS_SSH_PRIVATE_KEY" ]; then
                    echo "::error::You must set either VPS_PASSWORD or VPS_SSH_PRIVATE_KEY"
                    exit 1
                fi

            - name: Ensure deploy directory exists
              uses: appleboy/ssh-action@v1.2.0
              with:
                host: ${{ secrets.VPS_HOST }}
                username: ${{ secrets.VPS_USER }}
                password: ${{ secrets.VPS_PASSWORD }}
                key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
                passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
                port: ${{ secrets.VPS_PORT }}
                script_stop: true
                script: mkdir -p "${{ secrets.VPS_DEPLOY_PATH }}"

            - name: Upload image archive
              uses: appleboy/scp-action@v0.1.7
              with:
                host: ${{ secrets.VPS_HOST }}
                username: ${{ secrets.VPS_USER }}
                password: ${{ secrets.VPS_PASSWORD }}
                key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
                passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
                port: ${{ secrets.VPS_PORT }}
                source: deploy-artifacts/${{ env.IMAGE_ARCHIVE }}
                target: ${{ secrets.VPS_DEPLOY_PATH }}
                strip_components: 1

            - name: Run container on VPS
              uses: appleboy/ssh-action@v1.2.0
              env:
                IMAGE_ARCHIVE: ${{ env.IMAGE_ARCHIVE }}
                IMAGE_NAME: ${{ env.IMAGE_NAME }}
                CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
                SPRING_DATA_MONGODB_URI: ${{ secrets.SPRING_DATA_MONGODB_URI }}
                SPRING_DATA_MONGODB_DATABASE: ${{ secrets.SPRING_DATA_MONGODB_DATABASE }}
              with:
                host: ${{ secrets.VPS_HOST }}
                username: ${{ secrets.VPS_USER }}
                password: ${{ secrets.VPS_PASSWORD }}
                key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
                passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
                port: ${{ secrets.VPS_PORT }}
                script_stop: true
                envs: IMAGE_ARCHIVE,IMAGE_NAME,CONTAINER_NAME,SPRING_DATA_MONGODB_URI,SPRING_DATA_MONGODB_DATABASE
                script: |
                    set -e
                    DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"
                    cd "$DEPLOY_PATH"

                    ARCHIVE_PATH="$DEPLOY_PATH/$IMAGE_ARCHIVE"

                    if [ ! -f "$ARCHIVE_PATH" ]; then
                        ARCHIVE_PATH="$(find "$DEPLOY_PATH" -maxdepth 4 -type f -name "$IMAGE_ARCHIVE" | head -n 1)"
                    fi

                    if [ -z "$ARCHIVE_PATH" ] || [ ! -f "$ARCHIVE_PATH" ]; then
                        echo "Archive '$IMAGE_ARCHIVE' not found in '$DEPLOY_PATH'."
                        find "$DEPLOY_PATH" -maxdepth 4 -type f
                        exit 1
                    fi

                    docker load -i "$ARCHIVE_PATH"

                    if docker ps -a --format '{{.Names}}' | grep -Eq "^${CONTAINER_NAME}$"; then
                        docker rm -f "$CONTAINER_NAME"
                    fi

                    docker run -d \
                        --name "$CONTAINER_NAME" \
                        --restart unless-stopped \
                        -p 8080:8080 \
                        -e SPRING_DATA_MONGODB_URI="$SPRING_DATA_MONGODB_URI" \
                        -e SPRING_DATA_MONGODB_DATABASE="$SPRING_DATA_MONGODB_DATABASE" \
                        -e SERVER_PORT=8080 \
                        -e SPRING_PROFILES_ACTIVE=prod \
                        "$IMAGE_NAME"

                    rm -f "$ARCHIVE_PATH"