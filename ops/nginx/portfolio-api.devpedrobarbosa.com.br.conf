server {
    listen 80;
    listen [::]:80;
    server_name portfolio-api.devpedrobarbosa.com.br;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name portfolio-api.devpedrobarbosa.com.br;

    set $cors_origin "";

    if ($http_origin = "https://devpedrobarbosa.com.br") {
        set $cors_origin $http_origin;
    }

    if ($http_origin = "https://www.devpedrobarbosa.com.br") {
        set $cors_origin $http_origin;
    }

    if ($http_origin = "https://portfolio-api.devpedrobarbosa.com.br") {
        set $cors_origin $http_origin;
    }

    if ($http_origin = "http://localhost:5173") {
        set $cors_origin $http_origin;
    }

    if ($http_origin = "http://localhost:8080") {
        set $cors_origin $http_origin;
    }

    ssl_certificate /etc/letsencrypt/live/portfolio-api.devpedrobarbosa.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portfolio-api.devpedrobarbosa.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        if ($cors_origin != "") {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
            add_header Vary Origin always;
        }

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }
}
